<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2416"/>
      <stop offset="100%" style="stop-color:#1a5c3a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0b429"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="6" fill="none" stroke="rgba(240,180,41,0.25)" stroke-width="1"/>

  <!-- Crown shape -->
  <!-- Crown base bar -->
  <rect x="6" y="20" width="20" height="4" rx="1.5" fill="url(#gold)"/>

  <!-- Crown points - left outer, left inner, center top, right inner, right outer -->
  <polygon points="6,20 6,13 9.5,17 13,10 16,14.5 19,10 22.5,17 26,13 26,20" fill="url(#gold)"/>

  <!-- Three crown jewels (circles on top of points) -->
  <circle cx="6" cy="13" r="1.8" fill="url(#gold)"/>
  <circle cx="16" cy="9.5" r="2" fill="url(#gold)"/>
  <circle cx="26" cy="13" r="1.8" fill="url(#gold)"/>

  <!-- Jewel highlights -->
  <circle cx="6" cy="13" r="0.7" fill="rgba(255,255,255,0.5)"/>
  <circle cx="16" cy="9.5" r="0.8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="26" cy="13" r="0.7" fill="rgba(255,255,255,0.5)"/>

  <!-- S letter on crown base -->
  <text x="16" y="23.8" font-family="'Arial Black', Impact, sans-serif" font-size="4.2" font-weight="900" fill="#0a2416" text-anchor="middle" letter-spacing="0">S</text>
</svg>
